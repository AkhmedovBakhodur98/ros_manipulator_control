# AR4 ros2_control Controller Configuration
#
# Configures controllers for mock hardware simulation via mock_components/GenericSystem.
# Joint names match ar4_macro.xacro: J1-J6 (arm only, no gripper).

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

# Joint State Broadcaster - publishes all joint states to /joint_states
joint_state_broadcaster:
  ros__parameters:
    use_local_topics: false

# Arm Controller - trajectory execution for 6-DOF arm
arm_controller:
  ros__parameters:
    joints:
      - J1
      - J2
      - J3
      - J4
      - J5
      - J6

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0  # Hz
    action_monitor_rate: 20.0  # Hz

    allow_partial_joints_goal: false
    allow_nonzero_velocity_at_trajectory_end: true
    open_loop_control: false

    constraints:
      stopped_velocity_tolerance: 0.02  # rad/s
      goal_time: 0.0  # disabled

      # Per-joint tolerances
      J1: { trajectory: 0.0, goal: 0.05 }
      J2: { trajectory: 0.0, goal: 0.05 }
      J3: { trajectory: 0.0, goal: 0.05 }
      J4: { trajectory: 0.0, goal: 0.05 }
      J5: { trajectory: 0.0, goal: 0.05 }
      J6: { trajectory: 0.0, goal: 0.05 }
