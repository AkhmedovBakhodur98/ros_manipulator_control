# Gripper Service Configuration
# Controls symmetric jaw movement for open/close operations
#
# Jaw Logic:
#   - Both jaws get SAME value (URDF axes are opposite)
#   - home_position (0.0) = jaws apart (OPEN)
#   - home_position + open_offset = jaws together (CLOSED)

gripper_service:
  ros__parameters:
    # Joint configuration
    left_joint: "selector_left_container_jaw_joint"
    right_joint: "selector_right_container_jaw_joint"

    # Position configuration
    home_position: 0.0      # Open position - jaws fully apart (meters)
    open_offset: 0.05       # Closing distance from home (meters) = 5cm

    # Controller topic
    controller_topic: "/gripper_controller/commands"
