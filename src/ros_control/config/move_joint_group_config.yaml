# MoveJointGroup Action Server Configuration
move_joint_group_server:
  ros__parameters:
    # Position tolerance for success determination
    # Applied to all joints (meters for prismatic, radians for revolute)
    position_tolerance: 0.01  # 1cm or ~0.57 degrees

    # Execution strategy
    execution:
      # Strategy: "simultaneous" or "coordinated"
      # - simultaneous: All joints start moving at once, finish independently
      # - coordinated: All joints arrive at target at the same time
      strategy: "simultaneous"  # or "coordinated"
      
      # For coordinated strategy: maximum time to wait for all joints
      max_coordination_time: 10.0  # seconds
      
      # Maximum time to wait for joints to reach target (seconds)
      timeout: 30.0

    # Controller discovery
    discovery:
      # How often to refresh controller list (seconds)
      refresh_interval: 5.0
      
      # Timeout for controller queries (seconds)
      query_timeout: 2.0

    # Feedback publishing
    feedback:
      # Rate at which to publish feedback (Hz)
      publish_rate: 10.0
