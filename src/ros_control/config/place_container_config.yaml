place_container_server:
  ros__parameters:
    # Target position to place container
    place_position:
      base_main_frame_joint: 1.5
      main_frame_selector_frame_joint: 0.2

    # Retract movement (lower selector to clear container after release)
    retract_joint: main_frame_selector_frame_joint
    retract_distance: 0.10

    # Timing
    gripper_settle_time: 1.0

    # Timeouts
    timeouts:
      move_timeout: 30.0
      gripper_timeout: 5.0

    position_tolerance: 0.01
