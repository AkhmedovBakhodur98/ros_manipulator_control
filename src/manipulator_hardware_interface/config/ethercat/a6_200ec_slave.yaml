# A6-200EC slave config for ICube ethercat_driver_ros2 (EcCiA402Drive plugin).
#
# 1:1 translation of the PDO/DC config used by tools/csp_smoke/csp_smoke.c
# (Stage 4, 2026-05-14) — that program validated the same map drives the
# A6-200EC at alias 6 through CiA 402 to OperationEnabled with sine motion.
#
# Identity (verified on hardware 2026-05-14, see docs/.../a6_pdo_mapping.md):
vendor_id: 0x00400000
product_id: 0x00000715

# DC sync — AssignActivate from ESI OpMode DC. SYNC0 cycle and shift are
# derived by the IgH master from the EthercatDriver "control_frequency"
# URDF parameter (must be 1000 Hz to match the smoke test).
assign_activate: 0x0300

# Auto fault reset on startup so a stale 0x603F=0x8700 latch from a previous
# run (see known_issues §15) does not block first OperationEnabled. Once
# bring-up is solid we will switch to manual fault reset via the command
# interface.
auto_fault_reset: true

# Variable PDO mapping — fixed group 0x1701/0x1B01 traps slaves in
# SafeOP+Error on this firmware (a6_pdo_mapping.md §The Critical Pitfall).
# Mode of Operation 0x6060/0x6061 are not in the variable group defaults
# either — they are explicitly added below. The plugin reconfigures the
# mapping via SDO writes to 0x1600:N / 0x1A00:N before PREOP→SAFEOP.
rpdo:
  - index: 0x1600
    channels:
      - {index: 0x6040, sub_index: 0, type: uint16, default: 0}                                    # ControlWord (managed by plugin)
      - {index: 0x607a, sub_index: 0, type: int32,  command_interface: position, default: .nan}   # Target Position — raw encoder counts (no scaling for Stage 6)
      - {index: 0x6060, sub_index: 0, type: int8,   command_interface: mode_of_operation, default: 8}  # CSP

tpdo:
  - index: 0x1A00
    channels:
      - {index: 0x6041, sub_index: 0, type: uint16}                                                # StatusWord (read by plugin internally)
      - {index: 0x6064, sub_index: 0, type: int32, state_interface: position}                      # Actual Position — raw counts
      - {index: 0x6061, sub_index: 0, type: int8,  state_interface: mode_of_operation}             # Mode Display
      - {index: 0x606c, sub_index: 0, type: int32, state_interface: velocity}                      # Actual Velocity — drive reports rpm; no scaling for Stage 6
