# Generic slave config for StepperOnline A6N (200EC/400EC/750EC) under
# ICube ethercat_driver_ros2 (EcCiA402Drive plugin).
#
# All three power variants ship the same EtherCAT identity and the same
# object dictionary — verified against vendor/STEPPERONLINE_A6_Servo_V0.04.xml
# which declares a single <Type ProductCode="#x00000715">A6N Servo Driver</Type>.
# One YAML drives all 6 joints of the manipulator + SCARA.
#
# PDO map is the variable group 0x1600 / 0x1A00. The fixed group
# 0x1701 / 0x1B01 traps the drive in SafeOP+Error on this firmware —
# see a6_pdo_mapping.md §The Critical Pitfall.
#
# Stage 6.6b extends Stage 6.6a (digital_inputs only) with:
#   - control_word as a command_interface (homing action server writes
#     bit 4 to start a homing run; plugin's CiA 402 state machine
#     transitions the drive up to OperationEnabled before that).
#   - status_word as a state_interface (homing action server polls
#     bit 12 HomingAttained / bit 13 HomingError; safety node polls
#     bit 11 Internal limit active).
#   - sdo_config with bench-safe homing parameters (method 35 = current
#     position becomes zero, no motion — the safest starting point for
#     a fresh bring-up; flip to method 17/18/1/2 per joint once we know
#     where each hardstop sits).

vendor_id: 0x00400000
product_id: 0x00000715

assign_activate: 0x0300

auto_fault_reset: true

# Initial bring-up SDO writes — applied PreOp→SafeOp once per drive.
# Object indices and units per A6-EC user manual §6.4 (Homing Mode).
# Method 35: drive performs no motion when homing starts, only writes
# 0 into 0x6064. Speeds and acceleration are set conservatively so the
# first time we flip to a real motion method (17/18/1/2) nothing runs
# away while we are watching. ~5000 counts/s ≈ 2.3 rpm on 17-bit encoder.
sdo_config:
  - {index: 0x6098, sub_index: 0x00, type: int8,   value: 35}    # Homing method
  - {index: 0x6099, sub_index: 0x01, type: uint32, value: 5000}  # Speed during search for switch  [counts/s]
  - {index: 0x6099, sub_index: 0x02, type: uint32, value: 1000}  # Speed during search for zero    [counts/s]
  - {index: 0x609A, sub_index: 0x00, type: uint32, value: 5000}  # Homing acceleration             [counts/s^2]
  - {index: 0x607C, sub_index: 0x00, type: int32,  value: 0}     # Home offset                     [counts]

rpdo:
  - index: 0x1600
    channels:
      # ControlWord — command_interface so the homing action server can
      # drive bit 4 (Operation start = Homing start) once the drive is
      # in OperationEnabled. While the CiA 402 state machine is bringing
      # the drive up, the action server must keep this command at .nan
      # so the plugin's auto_state_transitions writes default_value.
      - {index: 0x6040, sub_index: 0, type: uint16, command_interface: control_word, default: .nan}
      - {index: 0x607a, sub_index: 0, type: int32,  command_interface: position, default: .nan}
      - {index: 0x6060, sub_index: 0, type: int8,   command_interface: mode_of_operation, default: 8}  # 8=CSP, 6=Homing — action server toggles

tpdo:
  - index: 0x1A00
    channels:
      # StatusWord — state_interface so the action server can poll
      # bit 12 (HomingAttained) / bit 13 (HomingError) and the safety
      # node can poll bit 11 (Internal limit active). The plugin still
      # consumes channel.last_value internally for CiA 402 state tracking.
      - {index: 0x6041, sub_index: 0, type: uint16, state_interface: status_word}
      - {index: 0x6064, sub_index: 0, type: int32,  state_interface: position}
      - {index: 0x6061, sub_index: 0, type: int8,   state_interface: mode_of_operation}
      - {index: 0x606c, sub_index: 0, type: int32,  state_interface: velocity}
      # Digital Inputs raw word (Stage 6.6a). Factory CN1 mapping:
      # DI1=P-OT (pin 10), DI2=N-OT (pin 9), DI3=HomeSwitch (pin 8).
      # CiA 402 0x60FD bit layout: bit 0 = N-OT, bit 1 = P-OT,
      # bit 2 = Home switch. Vendor 0x2003 / 0x2004 group params can
      # re-route which DI feeds which CiA bit if the default no longer
      # fits.
      - {index: 0x60FD, sub_index: 0, type: uint32, state_interface: digital_inputs}
