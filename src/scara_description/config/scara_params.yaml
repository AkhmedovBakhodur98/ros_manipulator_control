# SCARA Arm Parameters
# 3-DOF Selective Compliance Assembly Robot Arm

# ============================================================================
# MOUNTING CONFIGURATION
# ============================================================================
mount:
  # Offset from parent link to scara_base_link
  offset:
    xyz: [0.15, 0, 0.15]    # X, Y, Z offset [meters] - X: 15cm forward
    rpy: [0, 0, 0]          # Roll, Pitch, Yaw [radians]

# ============================================================================
# KINEMATIC PARAMETERS
# ============================================================================
kinematics:
  L1: 0.4125                # Shoulder to elbow length [m]
  L2: 0.2625                # Elbow to wrist length [m]
  # Workspace: 0.15m (min) to 0.675m (max) reach

# ============================================================================
# LINKS
# ============================================================================
links:
  scara_base_link:
    mesh: "scara_base_link.STL"
    color: [0.5, 0.5, 0.5, 1.0]   # Grey
    inertial:
      mass: 1.4882
      origin: {xyz: [0, 0.075726, -0.025], rpy: [0, 0, 0]}
      inertia: {ixx: 0.0084886, ixy: 0, ixz: 0,
                iyy: 0.0022117, iyz: 0, izz: 0.01008}

  scara_shoulder_link:
    mesh: "scara_shoulder_link.STL"
    color: [0.5, 0.5, 0.5, 1.0]   # Grey
    inertial:
      mass: 4.227
      origin: {xyz: [0.20625, 0, 0.025], rpy: [0, 0, 0]}
      inertia: {ixx: 0.0105, ixy: 0, ixz: 0,
                iyy: 0.1069, iyz: 0, izz: 0.1156}

  scara_forearm_link:
    mesh: "scara_forearm_link.STL"
    color: [0.5, 0.5, 0.5, 1.0]   # Grey
    inertial:
      mass: 2.5868
      origin: {xyz: [0.13125, 0, -0.025], rpy: [0, 0, 0]}
      inertia: {ixx: 0.0050626, ixy: 0, ixz: 0,
                iyy: 0.032276, iyz: 0, izz: 0.03626}

  scara_flange_link:
    mesh: "scara_flange_link.STL"
    color: [0.5, 0.5, 0.5, 1.0]   # Grey
    inertial:
      mass: 0.004
      origin: {xyz: [0, 0, 0], rpy: [0, 0, 0]}
      inertia: {ixx: 0.000001, ixy: 0, ixz: 0,
                iyy: 0.000001, iyz: 0, izz: 0.000001}

  tool_body_link:
    mesh: "tool_body_link.STL"
    color: [0.5, 0.5, 0.5, 1.0]   # Grey
    inertial:
      mass: 0.425
      origin: {xyz: [0.0091, 0, -0.1114], rpy: [0, 0, 0]}
      inertia: {ixx: 0.00158, ixy: 0, ixz: 0.000246,
                iyy: 0.0018, iyz: 0, izz: 0.000337}

  tcp_link:
    # Tool Center Point (visual marker, no mesh)
    color: [1.0, 0.5, 0.0, 1.0]   # Orange
    radius: 0.015
    inertial:
      mass: 0.01
      origin: {xyz: [0, 0, 0], rpy: [0, 0, 0]}
      inertia: {ixx: 0.000001, ixy: 0, ixz: 0,
                iyy: 0.000001, iyz: 0, izz: 0.000001}

# ============================================================================
# JOINTS
# ============================================================================
joints:
  # Shoulder joint (theta1 - base rotation)
  scara_shoulder_joint:
    type: "revolute"
    origin: {xyz: [0, 0, 0], rpy: [0, 0, 0]}
    axis: [0, 0, 1]         # Z-axis rotation
    limits:
      lower: -0.995         # -57 degrees
      upper: 0.995          # +57 degrees
      effort: 20.0          # Nm
      velocity: 1.6         # rad/s
    dynamics:
      damping: 1.0
      friction: 0.5

  # Elbow joint (theta2 - arm reach)
  scara_elbow_joint:
    type: "revolute"
    # origin.xyz is set dynamically to [L1, 0, 0]
    origin: {rpy: [0, 0, 0]}
    axis: [0, 0, 1]         # Z-axis rotation
    limits:
      lower: -3.228         # -185 degrees
      upper: 3.228          # +185 degrees
      effort: 3.3           # Nm
      velocity: 1.5         # rad/s
    dynamics:
      damping: 0.8
      friction: 0.3

  # Wrist joint (theta3 - end-effector orientation)
  scara_wrist_joint:
    type: "revolute"
    # origin.xyz is set dynamically to [L2, 0, -0.05]
    origin: {rpy: [0, 0, 0]}
    axis: [0, 0, 1]         # Z-axis rotation
    limits:
      lower: -6.28          # -360 degrees
      upper: 6.28           # +360 degrees
      effort: 5.0           # Nm
      velocity: 3.3         # rad/s
    dynamics:
      damping: 0.5
      friction: 0.2

  # Fixed joint: flange -> tool_body
  tool_fix_joint:
    type: "fixed"
    origin: {xyz: [0, 0, 0], rpy: [0, 0, 0]}

  # Fixed joint: tool_body -> tcp
  tool_to_tcp_joint:
    type: "fixed"
    origin: {xyz: [0, 0, -0.2], rpy: [0, 0, 0]}  # TCP offset

# ============================================================================
# SCARA CLIENT CONFIGURATION
# ============================================================================
scara_client:
  # SCARA controller (always required)
  controller_action: "/scara_controller/follow_joint_trajectory"
  joint_states_topic: "/joint_states"
  position_tolerance: 0.01    # rad
  timeout: 30.0               # seconds

  # Z-axis configuration (optional)
  z_axis:
    enabled: true
    joint_name: "selector_frame_picker_frame_joint"
    controller_action: "/picker_z_controller/follow_joint_trajectory"
    limits: {lower: -0.01, upper: 0.3, velocity: 1.0}

  # Tool configuration (optional)
  tool:
    type: "service"
    activate: "/scara_tool/activate"
    deactivate: "/scara_tool/deactivate"
    service_type: "std_srvs/srv/Trigger"
    settle_time: 0.5

  # Home position
  home:
    shoulder: 0.0
    elbow: 0.0
    wrist: 0.0
    z: 0.0

  # Elbow flip configuration (for move_linear_with_flip)
  elbow_flip:
    enabled: true
    joint_limit_margin: 0.15      # rad — trigger flip this far from elbow limit
    flip_duration: 1.5            # seconds for the flip motion
    z_unhook_offset: 0.03         # m — Z raise before flip

  # Linear motion parameters
  linear_motion:
    max_deviation: 0.005          # m (5mm) — max FK deviation from straight line

  # Default motion parameters
  defaults:
    velocity_scaling: 0.5
    linear_velocity: 0.1          # m/s
    linear_step_size: 0.005       # m
    elbow_up: true
