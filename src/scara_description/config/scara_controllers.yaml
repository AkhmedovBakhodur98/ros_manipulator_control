# ros2_control controller configuration for SCARA arm
#
# Controllers:
#   - joint_state_broadcaster: Publishes joint states to /joint_states
#   - scara_controller: JointTrajectoryController for all 3 SCARA joints
#
# Joints (3 total):
#   - scara_shoulder_joint (theta1): Base rotation (Z-axis, ±57°)
#   - scara_elbow_joint (theta2): Arm reach (Z-axis, ±185°)
#   - scara_wrist_joint (theta3): End-effector rotation (Z-axis, ±360°)

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # Controller declarations
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    scara_controller:
      type: joint_trajectory_controller/JointTrajectoryController


# Joint State Broadcaster
# Publishes all joint states to /joint_states topic
joint_state_broadcaster:
  ros__parameters:
    joints:
      - scara_shoulder_joint
      - scara_elbow_joint
      - scara_wrist_joint


# SCARA Controller (JointTrajectoryController)
# Controls all 3 SCARA joints with trajectory following
#
# Usage:
#   ros2 action send_goal /scara_controller/follow_joint_trajectory \
#     control_msgs/action/FollowJointTrajectory "{
#       trajectory: {
#         joint_names: [scara_shoulder_joint, scara_elbow_joint, scara_wrist_joint],
#         points: [{positions: [0.5, 0.3, 1.0], time_from_start: {sec: 2}}]
#       }
#     }"
scara_controller:
  ros__parameters:
    joints:
      - scara_shoulder_joint
      - scara_elbow_joint
      - scara_wrist_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0  # Hz
    action_monitor_rate: 20.0  # Hz

    allow_partial_joints_goal: false
    allow_integration_in_goal_trajectories: true
    interpolation_method: splines

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0  # 0 means no timeout

