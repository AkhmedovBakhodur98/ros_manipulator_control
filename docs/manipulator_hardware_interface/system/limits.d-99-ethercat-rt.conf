# Install to: /etc/security/limits.d/99-ethercat-rt.conf
#
# Applies via pam_limits.so — covers SSH and TTY (Ctrl+Alt+F<n>) login
# paths. NOT sufficient by itself on Ubuntu 24.04 + GDM: gnome-terminal
# does not inherit these (see rt_tuning.md §Userspace RT Limits and the
# companion systemd-99-ethercat-rt.conf).
#
# Membership: the user must be in the `ethercat` group, which IgH's
# installer does not create — see known_issues.md §10.

@ethercat   -   rtprio   95
@ethercat   -   memlock  unlimited
