# Install to: /etc/systemd/system.conf.d/99-ethercat-rt.conf
# Then: sudo reboot
#
# Raises RT/memlock limits for ALL services managed by systemd, including
# user@<UID>.service → systemd --user → gnome-terminal-server. Required
# under Ubuntu 24.04 + GDM + Wayland — pam_limits.so does not propagate
# into the user systemd manager on those sessions (see rt_tuning.md
# §Userspace RT Limits for the full explanation).
#
# Ceiling is 95, not 99. 99 is reserved for kernel migration/watchdog
# threads — a runaway userspace loop at 99 can hang the box.

[Manager]
DefaultLimitRTPRIO=95
DefaultLimitMEMLOCK=infinity
