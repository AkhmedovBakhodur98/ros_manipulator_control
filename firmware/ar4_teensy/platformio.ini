; PlatformIO configuration for AR4 Teensy 4.1 motor controller
;
; Flash:  pio run -t upload
; Monitor: pio device monitor -b 115200

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200

lib_deps =
    waspinator/AccelStepper@^1.64

build_flags =
    -D SERIAL_BAUD=115200
